<section class="registration">
<div class="container">
    <div class="heading">
    <h3>DONOR REGISTRATION</h3>
    </div>
    <div class="col-md-12">
    <form>
    <div class ="row">
    <div class="col-md-6">
        <div class="col-md-10" style="margin-left: auto;margin-right: auto;background-color: #f6f6f6;padding: 20px;border-radius: 5px;border:5px;">
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter Name" required>
            </div>
            <div class="form-group">
                <label>Gender :</label>
                <input type="radio" name="gender" value="0" required> Male
                <input type="radio" name="gender" value="1" required> Female
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" class="form-control" id="datepicker1" name="datepicker1" required>
            </div>
            <div class="form-group">
                <label>Blood Group</label>
                <select name="bloodgroup">
                    <option value="1">A1+</option>
                    <option value="2">A1-</option>
                    <option value="3">A2+</option>
                    <option value="4">A2-</option>
                    <option value="5">B+</option>
                    <option value="6">B-</option>
                    <option value="7">A1B+</option>
                    <option value="8">A1B-</option>
                    <option value="9">A2B+</option>
                    <option value="10">A2B-</option>
                    <option value="11">AB+</option>
                    <option value="12">AB-</option>
                    <option value="13">O+</option>
                    <option value="14">O-</option>
                    <option value="15">A+</option>
                    <option value="16">A-</option>
                </select>
            </div>
            <div class="form-group">
                <label>Weight</label>
                <input type="number" class="form-control" id="weight" name="weight" placeholder="Enter weight" required>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="col-md-10" style="margin-left: auto;margin-right: auto;background-color: #f6f6f6;padding: 20px;border-radius: 5px;border:5px;">
            <div class="form-group">
                <label>State :</label>
                <select  class="select" name="state" id="state">
                <option value="" >Select a State</option>
                    <option value="5" >Andaman And Nicobar Islands</option>
                    <option value="6" >Andhra Pradesh</option>
                    <option value="7" >Arunachal Pradesh</option>
                    <option value="8" >Assam</option>
                    <option value="9" >Bihar</option>
                    <option value="11" >Chhattisgarh</option>
                    <option value="12" >Dadra and Nagar Haveli</option>
                    <option value="13" >Daman and Diu</option>
                    <option value="2" >Delhi</option>
                    <option value="14" >Goa</option>
                    <option value="15" >Gujarat</option>
                    <option value="16" >Haryana</option>
                    <option value="17" >Himachal Pradesh</option>
                    <option value="18" >Jammu and Kashmir</option>
                    <option value="19" >Jharkhand</option>
                    <option value="20" >Karnataka</option>
                    <option value="21" >Kerala</option>
                    <option value="22" >Lakshadweep</option>
                    <option value="23" >Madhya Pradesh</option>
                    <option value="4" >Maharashtra</option>
                    <option value="24" >Manipur</option>
                    <option value="25" >Meghalaya</option>
                    <option value="26" >Mizoram</option>
                    <option value="27" >Nagaland</option>
                    <option value="28" >Odisha</option>
                    <option value="29" >Puducherry</option>
                    <option value="30" >Punjab</option>
                    <option value="3" >Rajasthan</option>
                    <option value="32" >Sikkim</option>
                    <option value="31" >Tamil Nadu</option>
                    <option value="33" >Telangana</option>
                    <option value="34" >Tripura</option>
                    <option value="1" >Uttar Pradesh</option>
                    <option value="35" >Uttarakhand</option>
                    <option value="36" >West Bengal</option>
                </select>
            </div>

            <div class="form-group">
            <label>City</label>
            <input type="text" class="form-control" id="city" name="city" placeholder="Enter city name" required>
            </div>
            <div class="form-group">
                <label>Pincode</label>
                <input type="number" class="form-control" maxlength="6" id="pincode" name="pincode" placeholder="Enter pincode" required>
            </div>
            <div class="form-group">
                <label>Mobile</label>
                <input type="number" class="form-control" maxlength="10" id="mobile" name="mobile" placeholder="Enter mobile" required>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="text" class="form-control" id="email" name="email" placeholder="Enter email" required>
            </div>
        </div>
        </div>
        </div>
            
        <div class="box-footer text-center center">
            <button type="submit" class="btn btn-danger">Register</button>
        </div>
    </form>
    </div>
</div>
